name: Publish OpenAPI

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment segment for GCS path and optional env file (e.g. staging, prod).'
        required: true
        type: string
      service-name:
        description: 'Service name segment for GCS path (e.g. user-api).'
        required: true
        type: string
      gcs-bucket:
        description: 'GCS bucket name without gs:// prefix.'
        required: true
        type: string
      generate-command:
        description: 'Shell command to generate the OpenAPI spec (e.g. pnpm openapi:generate).'
        required: true
        type: string
      openapi-output-path:
        description: 'Local path to the generated OpenAPI file.'
        required: false
        type: string
        default: openapi.json
      build-command:
        description: 'Optional shell command to run before generation (e.g. pnpm build). Leave empty to skip.'
        required: false
        type: string
        default: ''
      node-version:
        required: false
        type: string
        default: '18'
      pnpm-version:
        required: false
        type: string
        default: '8'
      workload_identity_provider:
        required: true
        type: string
      service_account:
        required: true
        type: string
      project_id:
        required: false
        type: string

jobs:
  publish-openapi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Set env
        run: |
          ENV_FILE="env/.env.${{ inputs.environment }}"
          if [ -f "$ENV_FILE" ]; then
            cp "$ENV_FILE" .env
          fi

      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Generate OpenAPI spec
        run: ${{ inputs.generate-command }}

      - name: Verify OpenAPI output
        run: |
          OUTPUT="${{ inputs.openapi-output-path }}"
          if [ ! -f "$OUTPUT" ]; then
            echo "Expected OpenAPI file not found: $OUTPUT"
            exit 1
          fi

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Upload OpenAPI to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: ${{ inputs.openapi-output-path }}
          destination: ${{ inputs.gcs-bucket }}/${{ inputs.environment }}/${{ inputs.service-name }}
          parent: false
